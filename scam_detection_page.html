<!-- Dynamic Content for the Scam Detection Page -->
<header class="mb-8">
    <h1 class="text-2xl sm:text-3xl font-bold text-white text-center">Advanced Scam Detection</h1>
    <p class="text-center text-gray-400 mt-2">Analyse Bitcoin blocks using simulated ML & Data Science algorithms.</p>
</header>

<!-- Input Section -->
<div class="luxury-card rounded-xl p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 items-center gap-4">
        <!-- Option 1: Last Block -->
        <button id="analyse-latest-block-button" class="bg-stone-800 border border-stone-700 hover:bg-stone-700 text-yellow-400 font-bold px-5 py-3 rounded-md text-base shadow-lg transition-transform transform hover:scale-105 flex items-center justify-center space-x-2 w-full">
            <ion-icon name="flash-outline" class="h-5 w-5"></ion-icon>
            <span>Analyse Latest Block</span>
        </button>

        <!-- Option 2: Number of Blocks -->
        <div class="flex items-center justify-center gap-2">
             <label for="num-blocks-scam-input" class="text-sm text-gray-400 whitespace-nowrap">Recent Blocks:</label>
             <input type="number" id="num-blocks-scam-input" value="1" min="1" max="5" class="bg-stone-800 border border-stone-700 rounded-md w-20 text-center py-2 focus:ring-yellow-500 focus:border-yellow-500">
             <button id="analyse-multiple-blocks-button" class="text-gray-300 bg-stone-700 hover:bg-stone-600 px-4 py-2 rounded-md text-sm font-medium">Analyse</button>
        </div>
    </div>
</div>

<!-- Step 1: Initial Fetch Result -->
<div id="initial-analysis-step" class="mt-8 hidden"></div>

<!-- Step 2: Deep Scan Results Area -->
<div id="scam-results-container" class="mt-8">
     <div class="text-center py-12 text-gray-500">
        <ion-icon name="shield-half-outline" class="text-5xl"></ion-icon>
        <p class="mt-2">Choose an option above to begin analysis.</p>
    </div>
</div>
